<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TASKR — Daily Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-left">
      <span class="logo">TASKR</span>
      <span class="tagline">GET THINGS DONE.</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">
        <span class="theme-icon" id="themeIcon">☀</span>
        <span class="theme-label" id="themeLabel">LIGHT</span>
      </button>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-num" id="totalCount">0</span>
          <span class="stat-label">TOTAL</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="doneCount">0</span>
          <span class="stat-label">DONE</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="pendingCount">0</span>
          <span class="stat-label">PENDING</span>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <aside class="panel panel-left">
      <div class="panel-title">
        <span id="formLabel">NEW TASK</span>
        <span class="panel-line"></span>
      </div>

      <form id="taskForm">
        <input type="hidden" id="editId" />

        <div class="field">
          <label>TASK TITLE *</label>
          <input type="text" id="titleInput" placeholder="What needs to be done?" required />
        </div>

        <div class="field">
          <label>DESCRIPTION</label>
          <textarea id="descInput" placeholder="Add details..." rows="3"></textarea>
        </div>

        <div class="row-fields">
          <div class="field">
            <label>PRIORITY</label>
            <select id="priorityInput">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="field">
            <label>CATEGORY</label>
            <input type="text" id="categoryInput" placeholder="e.g. Work" />
          </div>
        </div>

        <div class="field">
          <label>DUE DATE</label>
          <input type="date" id="dueDateInput" />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">ADD TASK</button>
          <button type="button" class="btn btn-ghost" id="cancelBtn" style="display:none">CANCEL</button>
        </div>
      </form>

      <div class="filter-section">
        <div class="panel-title" style="margin-top: 2rem;">
          <span>FILTER</span>
          <span class="panel-line"></span>
        </div>
        <div class="filter-buttons">
          <button class="filter-btn active" data-filter="all">ALL</button>
          <button class="filter-btn" data-filter="pending">PENDING</button>
          <button class="filter-btn" data-filter="completed">DONE</button>
          <button class="filter-btn" data-filter="high">🔴 HIGH</button>
          <button class="filter-btn" data-filter="medium">🟡 MED</button>
          <button class="filter-btn" data-filter="low">🟢 LOW</button>
        </div>
      </div>
    </aside>

    <section class="panel panel-right">
      <div class="panel-title">
        <span id="listLabel">ALL TASKS</span>
        <span class="panel-line"></span>
      </div>

      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search tasks..." />
        <span class="search-icon">⌕</span>
      </div>

      <div id="taskList" class="task-list">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">◎</div>
          <p>No tasks yet.<br/>Add your first task →</p>
        </div>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">DELETE TASK?</div>
      <p class="modal-text">This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirmDelete">DELETE</button>
        <button class="btn btn-ghost" id="cancelDelete">CANCEL</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
